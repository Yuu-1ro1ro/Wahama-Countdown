<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>和浜駐屯地 開校カウントダウン</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #2f3e46;
      color: #f4f1de;
      font-family: "Yu Gothic", "Meiryo", sans-serif;
      padding: 20px;
    }

    .container {
      max-width: 820px;
      margin: 40px auto;
      background: rgba(0, 0, 0, 0.18);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 12px;
      padding: 32px 20px 28px;
      text-align: center;
    }

    .title {
      font-size: clamp(1.5rem, 3vw, 2.1rem);
      font-weight: 700;
      margin-bottom: 18px;
    }

    .countdown {
      font-size: clamp(1.7rem, 4.5vw, 3.2rem);
      font-weight: 700;
      line-height: 1.6;
      margin-bottom: 10px;
    }

    .opening {
      display: none;
      font-size: clamp(2.8rem, 9vw, 5.8rem);
      font-weight: 900;
      color: #ffe066;
      animation: pulse 1.4s ease-in-out infinite;
      margin: 30px 0;
    }

    .subtext {
      margin-top: 10px;
      font-size: 0.95rem;
      color: rgba(244, 241, 222, 0.85);
    }

    .link-title {
      margin-top: 34px;
      margin-bottom: 14px;
      font-size: 1rem;
      font-weight: 700;
    }

    .link-area {
      display: flex;
      flex-direction: column;
      gap: 12px;
      align-items: stretch;
    }

    .link-card {
      display: block;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 10px;
      color: #ffffff;
      text-decoration: none;
      padding: 16px 14px;
      font-size: 1rem;
      font-weight: 700;
      transition: background 0.2s ease, transform 0.2s ease;
    }

    .link-card span {
      display: block;
      font-size: 0.82rem;
      font-weight: 400;
      opacity: 0.8;
      margin-top: 4px;
    }

    .link-card:hover {
      background: rgba(255, 255, 255, 0.14);
      transform: translateY(-1px);
    }

    @keyframes pulse {
      0% {
        transform: scale(0.92);
      }
      50% {
        transform: scale(1.06);
      }
      100% {
        transform: scale(0.92);
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div id="countdownArea">
      <div class="title">和浜駐屯地開校まで…</div>
      <div id="countdown" class="countdown">読み込み中…</div>
      <div class="subtext">4月10日 8:00 に開校になります。</div>
    </div>

    <div id="openingMessage" class="opening">開校です！！！！！</div>

    <div class="link-title">関連リンク</div>
    <div class="link-area">
      <a class="link-card" href="https://www.roblox.com/ja/games/73205683924540/4" target="_blank" rel="noopener noreferrer">
        ROBLOX
        <span>ゲームページはこちら</span>
      </a>
      <a class="link-card" href="https://discord.gg/xzhYPcnckW" target="_blank" rel="noopener noreferrer">
        DISCORD
        <span>サーバー参加はこちら</span>
      </a>
      <a class="link-card" href="https://www.roblox.com/communities/1075592462" target="_blank" rel="noopener noreferrer">
        ROBLOXグループ
        <span>グループページはこちら</span>
      </a>
    </div>
  </div>

  <script>
    // ここを必要に応じて変更してください。
    // 例: 2026年4月10日 8:00
    const targetDate = new Date("2026-04-10T08:00:00");

    const countdownEl = document.getElementById("countdown");
    const countdownArea = document.getElementById("countdownArea");
    const openingMessageEl = document.getElementById("openingMessage");

    function updateCountdown() {
      const now = new Date();
      const diff = targetDate - now;

      if (diff <= 0) {
        countdownArea.style.display = "none";
        openingMessageEl.style.display = "block";
        return;
      }

      const totalSeconds = Math.floor(diff / 1000);
      const days = Math.floor(totalSeconds / (60 * 60 * 24));
      const hours = Math.floor((totalSeconds % (60 * 60 * 24)) / (60 * 60));
      const minutes = Math.floor((totalSeconds % (60 * 60)) / 60);
      const seconds = totalSeconds % 60;

      countdownEl.textContent = `あと${days}日 ${hours}時間 ${minutes}分 ${seconds}秒！`;
    }

    updateCountdown();
    setInterval(updateCountdown, 1000);
  </script>
</body>
</html>
